<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon Panier - Youki and Co</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 40px 20px;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        border-radius: 30px;
        padding: 40px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        animation: slideUp 0.5s ease;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      h1 {
        color: #2c3e50;
        border-bottom: 3px solid #e74c3c;
        padding-bottom: 15px;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 15px;
      }
      h1 i {
        color: #e74c3c;
      }
      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
        border-bottom: 1px solid #f0f0f0;
        transition: all 0.3s;
      }
      .cart-item:hover {
        background: #f8f9fa;
        margin: 0 -10px;
        padding: 20px 10px;
      }
      .item-info {
        flex: 1;
      }
      .item-info h3 {
        color: #2c3e50;
        margin-bottom: 5px;
      }
      .item-info p {
        color: #7f8c8d;
        font-size: 0.9rem;
      }
      .item-quantity {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0 20px;
      }
      .item-quantity button {
        width: 30px;
        height: 30px;
        border: 1px solid #ddd;
        background: white;
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.3s;
      }
      .item-quantity button:hover {
        background: #e74c3c;
        color: white;
        border-color: #e74c3c;
      }
      .item-quantity span {
        min-width: 30px;
        text-align: center;
        font-weight: 600;
      }
      .item-price {
        font-size: 1.2rem;
        font-weight: 700;
        color: #e74c3c;
        min-width: 100px;
        text-align: right;
      }
      .item-remove {
        margin-left: 15px;
      }
      .item-remove button {
        background: none;
        border: none;
        color: #e74c3c;
        cursor: pointer;
        font-size: 1.2rem;
        transition: all 0.3s;
      }
      .item-remove button:hover {
        transform: scale(1.2);
      }
      .cart-summary {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 2px solid #f0f0f0;
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
      }
      .summary-row.total {
        font-size: 1.4rem;
        font-weight: 800;
        color: #e74c3c;
        border-top: 2px solid #f0f0f0;
        margin-top: 10px;
        padding-top: 15px;
      }
      .empty-cart {
        text-align: center;
        padding: 60px 20px;
      }
      .empty-cart i {
        font-size: 80px;
        color: #bdc3c7;
        margin-bottom: 20px;
      }
      .empty-cart p {
        color: #7f8c8d;
        font-size: 1.2rem;
      }
      .btn {
        display: inline-block;
        padding: 15px 35px;
        border-radius: 50px;
        font-weight: 600;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        border: none;
        margin-top: 20px;
      }
      .btn-primary {
        background: linear-gradient(135deg, #e74c3c, #c0392b);
        color: white;
      }
      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(231, 76, 60, 0.3);
      }
      .btn-secondary {
        background: #f8f9fa;
        color: #2c3e50;
        border: 2px solid #e0e0e0;
        margin-right: 15px;
      }
      .btn-secondary:hover {
        background: #e0e0e0;
      }
      .cart-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 30px;
      }
      .loading {
        text-align: center;
        padding: 40px;
      }
      .loading i {
        font-size: 40px;
        color: #e74c3c;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @media (max-width: 768px) {
        .container {
          padding: 20px;
        }
        .cart-item {
          flex-wrap: wrap;
        }
        .item-quantity {
          margin: 10px 0;
        }
        .item-price {
          text-align: left;
          margin-top: 10px;
        }
        .cart-actions {
          flex-direction: column;
          gap: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1><i class="fas fa-shopping-cart"></i> Mon Panier</h1>

      <div id="cart-content">
        <div class="loading">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Chargement de votre panier...</p>
        </div>
      </div>

      <div class="cart-actions">
        <a href="index.html" class="btn btn-secondary">
          <i class="fas fa-arrow-left"></i> Continuer mes achats
        </a>
        <button id="checkout-btn" class="btn btn-primary" style="display: none">
          <i class="fas fa-arrow-right"></i> Passer commande
        </button>
      </div>
    </div>

    <script>
      class PanierManager {
        constructor() {
          this.apiUrl = "acheter.php";
          this.panier = null;
          this.init();
        }

        async init() {
          await this.chargerPanier();
        }

        async chargerPanier() {
          try {
            const response = await fetch(
              `${this.apiUrl}?action=get_panier&_=${Date.now()}`,
            );
            const data = await response.json();

            if (data.status === 200) {
              this.panier = data.data;
              this.afficherPanier();
            } else {
              this.afficherErreur();
            }
          } catch (error) {
            console.error("Erreur:", error);
            this.afficherErreur();
          }
        }

        afficherPanier() {
          const container = document.getElementById("cart-content");
          const checkoutBtn = document.getElementById("checkout-btn");

          if (
            this.panier &&
            this.panier.articles &&
            this.panier.articles.length > 0
          ) {
            let html = "";

            this.panier.articles.forEach((article) => {
              html += `
                            <div class="cart-item" data-id="${article.idLignePanier}">
                                <div class="item-info">
                                    <h3>${this.escapeHtml(article.nom)}</h3>
                                    <p>${this.escapeHtml(article.description || "Description non disponible")}</p>
                                </div>
                                <div class="item-quantity">
                                    <button onclick="panierManager.modifierQuantite(${article.idLignePanier}, ${article.quantite - 1})">-</button>
                                    <span>${article.quantite}</span>
                                    <button onclick="panierManager.modifierQuantite(${article.idLignePanier}, ${article.quantite + 1})">+</button>
                                </div>
                                <div class="item-price">${article.totalLigne.toFixed(2)} €</div>
                                <div class="item-remove">
                                    <button onclick="panierManager.supprimerArticle(${article.idLignePanier})">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        `;
            });

            html += `
                        <div class="cart-summary">
                            <div class="summary-row">
                                <span>Sous-total</span>
                                <span>${this.panier.total.toFixed(2)} €</span>
                            </div>
                            <div class="summary-row total">
                                <span>Total TTC</span>
                                <span>${this.panier.total.toFixed(2)} €</span>
                            </div>
                        </div>
                    `;

            container.innerHTML = html;
            checkoutBtn.style.display = "block";
            checkoutBtn.onclick = () => this.passerCommande();
          } else {
            container.innerHTML = `
                        <div class="empty-cart">
                            <i class="fas fa-shopping-basket"></i>
                            <p>Votre panier est vide</p>
                            <a href="index.html" class="btn btn-primary" style="margin-top: 20px;">
                                <i class="fas fa-gift"></i> Découvrir nos produits
                            </a>
                        </div>
                    `;
            checkoutBtn.style.display = "none";
          }
        }

        afficherErreur() {
          document.getElementById("cart-content").innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Erreur lors du chargement du panier</p>
                        <button onclick="location.reload()" class="btn btn-primary" style="margin-top: 20px;">
                            <i class="fas fa-sync-alt"></i> Réessayer
                        </button>
                    </div>
                `;
        }

        async modifierQuantite(idLignePanier, nouvelleQuantite) {
          if (nouvelleQuantite < 1) {
            await this.supprimerArticle(idLignePanier);
            return;
          }

          try {
            const response = await fetch(this.apiUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                action: "modifier_quantite",
                idLignePanier: idLignePanier,
                quantite: nouvelleQuantite,
              }),
            });

            const result = await response.json();

            if (result.status === 200) {
              await this.chargerPanier();
              this.mettreAJourCompteurGlobal();
              this.showNotification("Quantité modifiée", "success");
            } else {
              this.showNotification("Erreur lors de la modification", "error");
            }
          } catch (error) {
            console.error("Erreur:", error);
            this.showNotification("Erreur réseau", "error");
          }
        }

        async supprimerArticle(idLignePanier) {
          try {
            const response = await fetch(this.apiUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                action: "supprimer_du_panier",
                idLignePanier: idLignePanier,
              }),
            });

            const result = await response.json();

            if (result.status === 200) {
              await this.chargerPanier();
              this.mettreAJourCompteurGlobal();
              this.showNotification("Article supprimé", "success");
            } else {
              this.showNotification("Erreur lors de la suppression", "error");
            }
          } catch (error) {
            console.error("Erreur:", error);
            this.showNotification("Erreur réseau", "error");
          }
        }

        // ============================================
        // PASSER COMMANDE - REDIRECTION CORRIGÉE
        // ============================================
        async passerCommande() {
          // Vérifier que le panier n'est pas vide
          if (
            !this.panier ||
            !this.panier.articles ||
            this.panier.articles.length === 0
          ) {
            this.showNotification("Votre panier est vide", "error");
            return;
          }

          // DÉSACTIVER LE BOUTON POUR ÉVITER LES DOUBLONS
          const checkoutBtn = document.getElementById("checkout-btn");
          const originalText = checkoutBtn.innerHTML;
          checkoutBtn.innerHTML =
            '<i class="fas fa-spinner fa-spin"></i> Redirection...';
          checkoutBtn.disabled = true;

          try {
            // ÉTAPE 1: Vérifier/synchroniser le panier avec le serveur
            console.log("Vérification du panier avant redirection...");

            const syncResponse = await fetch(this.apiUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                action: "verifier_panier_avant_commande",
              }),
            });

            const syncResult = await syncResponse.json();
            console.log("Résultat synchronisation:", syncResult);

            // ÉTAPE 2: Redirection vers livraison_form.php
            // Ajout d'un paramètre timestamp pour éviter le cache
            const timestamp = Date.now();
            window.location.href = `livraison_form.php?t=${timestamp}`;
          } catch (error) {
            console.error("Erreur lors de la préparation:", error);
            // En cas d'erreur, rediriger quand même
            window.location.href = "livraison_form.php";
          }
        }

        mettreAJourCompteurGlobal() {
          const event = new CustomEvent("panierMisAJour", {
            detail: this.panier,
          });
          window.dispatchEvent(event);
        }

        showNotification(message, type = "success") {
          const oldNotif = document.querySelector(".custom-notification");
          if (oldNotif) oldNotif.remove();

          const notif = document.createElement("div");
          notif.className = "custom-notification";
          notif.style.cssText = `
                    position: fixed;
                    bottom: 20px;
                    right: 20px;
                    background: ${type === "success" ? "#27ae60" : "#e74c3c"};
                    color: white;
                    padding: 15px 25px;
                    border-radius: 10px;
                    z-index: 10000;
                    animation: slideInRight 0.3s ease;
                    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                `;
          notif.innerHTML = `<i class="fas fa-${type === "success" ? "check-circle" : "exclamation-circle"}"></i> ${message}`;
          document.body.appendChild(notif);
          setTimeout(() => notif.remove(), 3000);
        }

        escapeHtml(text) {
          const div = document.createElement("div");
          div.textContent = text;
          return div.innerHTML;
        }
      }

      let panierManager;
      document.addEventListener("DOMContentLoaded", () => {
        panierManager = new PanierManager();
      });
    </script>
  </body>
</html>
